<!DOCTYPE html>
<html>
<head>
    <title>PayPal Simple Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .info { background: #e7f3ff; border: 1px solid #b3d7ff; padding: 15px; margin: 20px 0; border-radius: 5px; }
        .result { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>🔧 PayPal Basic Test</h1>
    
    <div class="info">
        <h3>Testing with minimal PayPal SDK configuration</h3>
        <p>This uses the simplest possible setup to isolate the issue.</p>
    </div>
    
    <div id="paypal-button-container"></div>
    <div id="result"></div>

    <!-- Minimal PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=Aa-iCAOutWockxTzJg7SqHatpnPjvuWd9uhv8sms2sTf36pkBLZYCb8sKf_hNZVVHqNUyo9-3Iy9IIb5&currency=USD"></script>
    
    <script>
        console.log('🔧 Testing minimal PayPal configuration...');
        
        // Check if PayPal SDK loaded
        if (typeof paypal === 'undefined') {
            document.getElementById('result').innerHTML = `
                <div class="error">
                    <h3>❌ PayPal SDK Failed to Load</h3>
                    <p>The PayPal SDK could not be loaded. Check the client ID and network connection.</p>
                </div>
            `;
        } else {
            console.log('✅ PayPal SDK loaded successfully');
            
            // Create a simple one-time payment button first
            paypal.Buttons({
                style: {
                    color: 'blue',
                    shape: 'rect',
                    label: 'pay'
                },
                
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: {
                                value: '9.99'
                            },
                            description: 'Test Payment - K-Learn Premium'
                        }]
                    });
                },
                
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        console.log('✅ Payment successful:', details);
                        document.getElementById('result').innerHTML = `
                            <div class="success">
                                <h3>🎉 Payment Test Successful!</h3>
                                <p><strong>Order ID:</strong> ${data.orderID}</p>
                                <p><strong>Payer:</strong> ${details.payer.name.given_name}</p>
                                <p>Basic PayPal integration is working!</p>
                            </div>
                        `;
                    });
                },
                
                onError: function(err) {
                    console.error('❌ PayPal Error:', err);
                    document.getElementById('result').innerHTML = `
                        <div class="error">
                            <h3>❌ Payment Error</h3>
                            <pre>${JSON.stringify(err, null, 2)}</pre>
                        </div>
                    `;
                },
                
                onCancel: function(data) {
                    console.log('🚫 Payment cancelled:', data);
                    document.getElementById('result').innerHTML = `
                        <div class="info">
                            <h3>🚫 Payment Cancelled</h3>
                            <p>User cancelled the payment</p>
                        </div>
                    `;
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
