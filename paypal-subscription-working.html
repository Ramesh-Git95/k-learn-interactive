<!DOCTYPE html>
<html>
<head>
    <title>PayPal Subscription Test - Working Version</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .warning { background: #fff3cd; border: 1px solid #ffeaa7; padding: 15px; margin: 20px 0; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; padding: 15px; margin: 20px 0; border-radius: 5px; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; padding: 15px; margin: 20px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🔄 PayPal Subscription Test - Working Version</h1>
    
    <div class="success">
        <strong>✅ Configuration Verified:</strong> Your PayPal sandbox setup is working!
    </div>
    
    <div class="warning">
        <strong>🧪 Subscription Test:</strong>
        <ul>
            <li>Plan: $9.99/month recurring</li>
            <li>Login: sb-oq9ms31932099@personal.example.com</li>
            <li>Password: >8gB&]?g</li>
            <li>Uses your $5000 sandbox balance</li>
        </ul>
    </div>
    
    <h2>🚀 PayPal Subscription Test</h2>
    <div id="paypal-button-container"></div>
    
    <div id="result"></div>

    <!-- Minimal SDK with subscription support -->
    <script src="https://www.paypal.com/sdk/js?client-id=Aa-iCAOutWockxTzJg7SqHatpnPjvuWd9uhv8sms2sTf36pkBLZYCb8sKf_hNZVVHqNUyo9-3Iy9IIb5&vault=true&intent=subscription&currency=USD"></script>
    
    <script>
        console.log('🔄 PayPal SDK loaded for subscriptions');
        
        paypal.Buttons({
            style: {
                color: 'blue',
                shape: 'rect',
                label: 'subscribe',
                height: 40
            },
            
            createSubscription: function(data, actions) {
                console.log('🔄 Creating subscription...');
                return actions.subscription.create({
                    'plan_id': 'P-7NG533434M885384WNC2ADRI'
                });
            },
            
            onApprove: function(data, actions) {
                console.log('✅ Subscription approved:', data);
                document.getElementById('result').innerHTML = `
                    <div class="success">
                        <h3>🎉 SUBSCRIPTION SUCCESS!</h3>
                        <p><strong>Subscription ID:</strong> ${data.subscriptionID}</p>
                        <p>Monthly subscription activated successfully!</p>
                        <p><strong>Plan:</strong> $9.99/month</p>
                    </div>
                `;
                
                // Here you would normally send the subscription ID to your backend
                console.log('📤 Send this to your backend:', {
                    subscriptionId: data.subscriptionID,
                    planId: 'P-7NG533434M885384WNC2ADRI',
                    userId: 'test-user-id'
                });
            },
            
            onError: function(err) {
                console.error('❌ Subscription Error:', err);
                document.getElementById('result').innerHTML = `
                    <div class="error">
                        <h3>❌ Subscription Error</h3>
                        <p><strong>Details:</strong> ${JSON.stringify(err, null, 2)}</p>
                    </div>
                `;
            },
            
            onCancel: function(data) {
                console.log('🚫 Subscription cancelled:', data);
                document.getElementById('result').innerHTML = `
                    <div class="warning">
                        <h3>🚫 Cancelled</h3>
                        <p>Subscription was cancelled by user</p>
                    </div>
                `;
            }
        }).render('#paypal-button-container');
        
        console.log('✅ Subscription buttons rendered');
    </script>
</body>
</html>
