                '0%': { transform: 'rotateY(180deg)' },
                '100%': { transform: 'rotateY(0)' },
              },
              'fadeIn': {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'slideIn': {
                '0%': { opacity: '0', transform: 'translateX(-20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },

              },

    <style>
      /* Base typography and font loading */
      body {
        font-family: 'Inter', 'Noto Sans KR', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Enhanced accessibility - preserves 3D card animations */
      @media (prefers-reduced-motion: reduce) {
        *:not(.perspective):not(.perspective *):not(.transform-style-3d):not(.transform-style-3d *),
        *::before:not(.perspective *):not(.transform-style-3d *),
        *::after:not(.perspective *):not(.transform-style-3d *) {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
      
      /* Focus management for accessibility */
      .focus-visible:focus {
        outline: 2px solid #98c1d9;
        outline-offset: 2px;
      }
      
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      
      .focus\\:not-sr-only:focus {
        position: static;
        width: auto;
        height: auto;
        padding: inherit;
        margin: inherit;
        overflow: visible;
        clip: auto;
        white-space: normal;
      }
      
      /* High contrast mode support */
      @media (prefers-contrast: high) {
        .hc-mode {
          background: #000000 !important;
          color: #ffffff !important;
        }
        .hc-mode button,
        .hc-mode .bg-white {
          background: #ffffff !important;
          color: #000000 !important;
          border: 2px solid #ffffff;
        }
      }
      
      /* Enhanced 3D card effects */
      .perspective {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
      
      /* Smooth scrolling with custom easing */
      html {
        scroll-behavior: smooth;
      }
      
      /* Enhanced scrollbar design */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(45deg, #98C1D9, #3D5A80);
        border-radius: 10px;
        transition: background 0.3s ease;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(45deg, #3D5A80, #293241);
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }
      
      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-track {
        background: #2d3748;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: linear-gradient(45deg, #4a5568, #98c1d9);
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(45deg, #98c1d9, #a0aec0);
      }
      
      /* Theme transition effects */
      .theme-transitioning * {
        transition: background-color 300ms ease-in-out, 
                   border-color 300ms ease-in-out, 
                   color 300ms ease-in-out,
                   box-shadow 300ms ease-in-out !important;
      }
      
      /* Mobile-first responsive design enhancements */
      @media (max-width: 640px) {
        .mobile-optimized {
          font-size: 16px; /* Prevent zoom on iOS */
        }
        
        /* Improved touch targets */
        button, .touch-target {
          min-height: 44px;
          min-width: 44px;
        }
        
        /* Better mobile spacing */
        .mobile-spacing {
          padding: 1rem;
        }
      }
      
      /* Enhanced hover effects with proper mobile handling */
      @media (hover: hover) and (pointer: fine) {
        .hover-lift:hover {
          transform: translateY(-2px);
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-scale:hover {
          transform: scale(1.02);
          transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
      }
      
      /* Loading states */
      .loading-shimmer {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.2) 20%,
          rgba(255, 255, 255, 0.5) 60%,
          rgba(255, 255, 255, 0)
        );
        animation: shimmer 2s infinite;
      }
      
      @keyframes shimmer {
        0% {
          background-position: -468px 0;
        }
        100% {
          background-position: 468px 0;
        }
      }
      
      /* Custom selection colors */
      ::selection {
        background-color: #98C1D9;
        color: #293241;
      }
      
      .dark ::selection {
        background-color: #98c1d9;
        color: #1a202c;
      }
      
      /* Print styles */
      @media print {
        .no-print {
          display: none !important;
        }
        
        body {
          background: white !important;
          color: black !important;
        }
      }
    </style>

<style>
  /* ── Brand design tokens (#17) ──────────────────────────────────────────
     Single source of truth for the K-Learn brand gradients. Lives here (not
     in src/index.css) because the app's styling is runtime-compiled by the
     Tailwind Play CDN — src/index.css is not part of the build graph. */
  :root {
    --brand-pink: #EC4899;
    --brand-violet: #8B5CF6;
    --brand-cyan: #06B6D4;
    --brand-gradient: linear-gradient(135deg, #EC4899, #8B5CF6);
    --brand-gradient-h: linear-gradient(90deg, #EC4899, #8B5CF6);
    --brand-gradient-hero: linear-gradient(135deg, #EC4899 0%, #8B5CF6 60%, #06B6D4 100%);
    --brand-gradient-hero-rev: linear-gradient(135deg, #06B6D4 0%, #8B5CF6 50%, #EC4899 100%);
  }

  /* ── Hierarchy utilities (#18) ──────────────────────────────────────────
     btn-brand → the ONE loud primary action per screen (gradient + lift)
     badge-brand → quiet metadata pills (counts, types, labels)
     tab-brand-active → selected tab/pill state without shouting */
  .btn-brand {
    background-image: var(--brand-gradient);
    color: #fff;
    box-shadow: 0 4px 14px rgba(139, 92, 246, 0.35);
    transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
  }
  .btn-brand:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 22px rgba(139, 92, 246, 0.45);
    filter: brightness(1.03);
  }
  .btn-brand:active { transform: translateY(0) scale(0.98); box-shadow: 0 3px 10px rgba(139, 92, 246, 0.35); }
  .btn-brand:disabled { opacity: 0.4; transform: none; box-shadow: none; cursor: not-allowed; }

  .badge-brand { background: rgba(139, 92, 246, 0.10); color: #7C3AED; }
  .dark .badge-brand { background: rgba(139, 92, 246, 0.20); color: #C4B5FD; }

  .tab-brand-active {
    background: rgba(236, 72, 153, 0.10);
    box-shadow: inset 0 0 0 1.5px rgba(236, 72, 153, 0.4);
    color: #DB2777;
  }
  .dark .tab-brand-active {
    background: rgba(236, 72, 153, 0.18);
    box-shadow: inset 0 0 0 1.5px rgba(244, 114, 182, 0.45);
    color: #F472B6;
  }

  .bg-brand-gradient { background-image: var(--brand-gradient); }
  .bg-brand-gradient-hero { background-image: var(--brand-gradient-hero); }
  .text-brand-gradient {
    background-image: var(--brand-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
</style>
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
